<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkedln Scraper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="brand-block">
        <div class="brand-row">
          <span class="brand-logo" aria-hidden="true">in</span>
          <p class="brand">Linkedln Scraper</p>
        </div>
        <p class="version">Version 1.0</p>
      </div>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <span class="toggle-icon" aria-hidden="true">◐</span>
      </button>
    </nav>
    <main class="content">
      <div class="search-area">
        <p class="search-label">Company Discovery</p>
        <div class="search-shell">
        <span class="search-icon" aria-hidden="true">&#128269;</span>
        <input
          id="lead-search"
          class="lead-search"
          type="search"
          placeholder="Find valuable leads or employers now..."
          aria-label="Search valuable leads or employers"
        />
        </div>
        <ul id="suggestions" class="suggestions" aria-live="polite"></ul>
      </div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
